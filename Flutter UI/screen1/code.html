<div class="relative flex items-center justify-center">

<span class="material-symbols-outlined text-on-tertiary-container absolute text-2xl mt-1" style="font-variation-settings: 'FILL' 1;">add_road</span>
</div>

<h1 class="text-white font-headline text-3xl font-extrabold tracking-tight mb-1">

            </h1>
<p class="text-white/80 font-body text-sm tracking-widest uppercase">
                Solapur Smart Roads
            </p>
</div>
</header>
<!-- Main Content: Login Card -->
<main class="w-full max-w-md px-6 -mt-12 z-20">
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0px_12px_32px_rgba(26,28,30,0.06)] border border-outline-variant/15">
<h2 class="text-on-surface font-headline text-xl font-bold mb-8">
                Enter your mobile number
            </h2>
<form class="space-y-8">
<!-- Phone Input Group -->
<div class="relative group">
<div class="flex items-center bg-surface-container-highest rounded-full px-6 py-4 transition-all duration-200 group-focus-within:bg-surface-bright group-focus-within:ring-2 group-focus-within:ring-primary/20">
<span class="text-on-surface-variant font-semibold mr-3 border-r border-outline-variant/40 pr-3">
                            +91
                        </span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-medium placeholder:text-on-surface-variant/40" maxlength="10" placeholder="99999 99999" type="tel"/>
</div>
<!-- Interaction Indicator -->
<div class="absolute bottom-0 left-6 right-6 h-0.5 bg-on-tertiary-container scale-x-0 group-focus-within:scale-x-100 transition-transform duration-300 rounded-full"></div>
</div>
<!-- Action Button -->
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white rounded-full font-headline font-bold text-lg shadow-md active:scale-95 transition-all flex items-center justify-center gap-2 group" type="submit">
                    Send OTP
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Helper Text -->
<p class="mt-6 text-on-surface-variant/70 text-center text-sm font-body">
                You will receive a 6-digit OTP via SMS
            </p>
</div>
<!-- Secondary Task Links / Privacy -->
<div class="mt-8 flex flex-col items-center gap-4">
<p class="text-xs text-on-surface-variant/60 max-w-[240px] text-center leading-relaxed">By continuing, you agree to SMC's privacy and digital service terms.</p>
</div>
</main>
<!-- Language Toggle / Footer Shell -->

<div class="flex items-center gap-3 bg-surface-container-low px-5 py-2.5 rounded-full shadow-sm">
