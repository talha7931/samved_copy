name: road_nirman_field
description: Solapur Smart Roads field apps (Citizen / JE / Contractor / Mukadam) — syncs with Supabase.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  path: ^1.9.0
  connectivity_plus: ^6.1.0
  cached_network_image: ^3.4.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
